<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" gradientUnits="userSpaceOnUse" x1="60" y1="60" x2="452" y2="452">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wave" gradientUnits="userSpaceOnUse" x1="186" y1="256" x2="326" y2="256">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#1a2836"/>
      <stop offset="62%" stop-color="#0e1722"/>
      <stop offset="100%" stop-color="#070c12"/>
    </radialGradient>
    <radialGradient id="label" cx="42%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="45%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <linearGradient id="sheen" gradientUnits="userSpaceOnUse" x1="120" y1="100" x2="392" y2="412">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="arcTop" d="M 256 256 m -176 0 a 176 176 0 1 1 352 0" fill="none"/>
    <path id="arcBottom" d="M 256 256 m -176 0 a 176 176 0 1 0 352 0" fill="none"/>
  </defs>

  <!-- vinyl disc -->
  <circle cx="256" cy="256" r="246" fill="url(#vinyl)"/>
  <circle cx="256" cy="256" r="246" fill="none" stroke="url(#ring)" stroke-width="9" filter="url(#glow)"/>

  <!-- dense grooves -->
  <g fill="none" stroke="#223344" stroke-width="1.4">
    <circle cx="256" cy="256" r="226" opacity="0.85"/>
    <circle cx="256" cy="256" r="218" opacity="0.55"/>
    <circle cx="256" cy="256" r="210" opacity="0.85"/>
    <circle cx="256" cy="256" r="202" opacity="0.5"/>
    <circle cx="256" cy="256" r="150" opacity="0.85"/>
    <circle cx="256" cy="256" r="142" opacity="0.55"/>
    <circle cx="256" cy="256" r="134" opacity="0.85"/>
    <circle cx="256" cy="256" r="126" opacity="0.5"/>
    <circle cx="256" cy="256" r="118" opacity="0.8"/>
  </g>

  <!-- vinyl sheen -->
  <path d="M 256 16 A 240 240 0 0 1 496 256 L 430 256 A 174 174 0 0 0 256 82 Z" fill="url(#sheen)"/>
  <path d="M 256 496 A 240 240 0 0 1 16 256 L 82 256 A 174 174 0 0 0 256 430 Z" fill="url(#sheen)" opacity="0.5"/>

  <!-- curved wordmark -->
  <text font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="800"
        letter-spacing="9" fill="#f1f5f9" filter="url(#softglow)">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">DJ VASSALLO</textPath>
  </text>

  <!-- center label -->
  <circle cx="256" cy="256" r="104" fill="url(#label)"/>
  <circle cx="256" cy="256" r="104" fill="none" stroke="#22d3ee" stroke-width="4" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="96" fill="none" stroke="#831843" stroke-width="1.5" opacity="0.6"/>

  <!-- waveform on the label -->
  <g stroke="#0b1119" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <line x1="192" y1="256" x2="192" y2="256"/>
    <line x1="208" y1="244" x2="208" y2="268"/>
    <line x1="224" y1="232" x2="224" y2="280"/>
    <line x1="240" y1="248" x2="240" y2="264"/>
    <line x1="256" y1="222" x2="256" y2="290"/>
    <line x1="272" y1="240" x2="272" y2="272"/>
    <line x1="288" y1="228" x2="288" y2="284"/>
    <line x1="304" y1="246" x2="304" y2="266"/>
    <line x1="320" y1="256" x2="320" y2="256"/>
  </g>

  <!-- spindle hole -->
  <circle cx="256" cy="256" r="13" fill="#070c12"/>
  <circle cx="256" cy="256" r="13" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.7"/>
  <circle cx="252" cy="252" r="3" fill="#cbd5e1" opacity="0.35"/>
</svg>
